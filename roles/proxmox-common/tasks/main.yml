- name: Remove enterprise repository sources
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ pve_enterprise_sources }}"
  notify: Update apt cache

- name: Add PVE no-subscription repository
  ansible.builtin.apt_repository:
    repo: "{{ pve_no_subscription_repo }}"
    filename: pve-no-subscription
    state: present
  notify: Update apt cache

- name: Flush handlers to update apt cache
  ansible.builtin.meta: flush_handlers

- name: Install PVE utilities
  ansible.builtin.apt:
    name:
      - libguestfs-tools
      - lm-sensors
    state: present

- name: Create admin PAM user
  ansible.builtin.user:
    name: "{{ pve_admin_user }}"
    password: "{{ pve_admin_password_hash }}"
    shell: /bin/bash
    create_home: true
    groups: sudo
    append: true

- name: Set up SSH key for admin user
  ansible.builtin.authorized_key:
    user: "{{ pve_admin_user }}"
    key: "{{ pve_admin_ssh_pubkey }}"
    state: present

- name: Register admin user in Proxmox
  ansible.builtin.command:
    cmd: pveum user add {{ pve_admin_user }}@pam
  register: pveum_add
  changed_when: pveum_add.rc == 0
  failed_when: pveum_add.rc != 0 and 'already exists' not in pveum_add.stderr

- name: Grant admin user Administrator role
  ansible.builtin.command:
    cmd: pveum acl modify / --users {{ pve_admin_user }}@pam --roles Administrator
  changed_when: true
